  <link rel="icon" type="image/svg+xml" href="images/shared/icon.svg" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Inter:wght@100..900&family=TikTok+Sans:wdth,wght@75..125,300..900&display=swap"
    rel="stylesheet" />

<body class="page-home">

  <!-- â”€â”€ NAVIGATION â”€â”€ -->
  <header class="nav-wrapper" id="nav-wrapper">
    <nav class="nav layout--medium" id="main-nav" aria-label="Main navigation">
      <div class="nav__island nav__island--left">
        <a href="index.html" class="nav__logo nav__logo--active" aria-label="Pilar Meaca home" aria-current="page">
          <img src="images/shared/icon.svg" alt="" class="nav__logo-img" width="32" height="32" />
        </a>
        <ul class="nav__links nav__links--primary" role="list">
          <li><a href="work.html" class="nav__link"><span class="nav__link-text">Work</span></a></li>
          <li><a href="/reel" class="nav__link"><span class="nav__link-text">Reel</span></a></li>
          <li><a href="/about" class="nav__link"><span class="nav__link-text">About</span></a></li>
        </ul>
      </div>

      <div class="nav__island nav__island--right">
        <ul class="nav__links nav__filters" role="list" aria-label="Filter projects">
          <li>
            <button type="button" class="nav__link nav__link--active" data-work-filter="featured" aria-pressed="true"><span class="nav__link-text">Featured</span></button>
          </li>
          <li>
            <button type="button" class="nav__link" data-work-filter="all" aria-pressed="false"><span class="nav__link-text">All</span></button>
          </li>
        </ul>
      </div>
    </nav>
  </header>
  <div class="nav-spacer" id="nav-spacer" aria-hidden="true"></div>

  <main>

    <!-- â”€â”€ HERO â”€â”€ -->
    <section class="hero" id="hero" aria-label="Hero showreel">
      <div class="hero__media">
        <video class="hero__image browser-92" autoplay muted loop playsinline preload="auto"
          aria-label="Pilar Meaca showreel">
          <source src="images/video/Reel_home.webm" type="video/webm" />
        </video>
        <!-- Diagonal speed lines overlay (CSS-driven) -->
        <div class="hero__lines" aria-hidden="true">
          <span class="hero__line hero__line--yellow hero__line--1"></span>
          <span class="hero__line hero__line--yellow hero__line--2"></span>
          <span class="hero__line hero__line--orange hero__line--3"></span>
          <span class="hero__line hero__line--orange hero__line--4"></span>
          <span class="hero__line hero__line--yellow hero__line--5"></span>
        </div>
      </div>
    </section>

    <!-- â”€â”€ BIO â”€â”€ -->
    <section class="bio" id="bio" aria-labelledby="bio-text">
      <p class="bio__text" id="bio-text">
        Motion graphics designer with 15+ years<br>
        of experience working across broadcast,<br>
        product development, and video games,<br>
        based in Buenos Aires.
      </p>
    </section>

    <footer class="site-footer">
      <div class="site-footer__top">
        <span class="site-footer__copy">2026 Pilar Meaca®</span>
        <a href="#top" class="site-footer__back">Back to top ↑</a>
      </div>
      <div class="site-footer__bottom">
        <a href="mailto:pilarmeaca@gmail.com" class="site-footer__link">pilarmeaca@gmail.com</a>
        <a href="https://linkedin.com/in/pilarmeaca" target="_blank" rel="noopener" class="site-footer__link">LinkedIn</a>
        <span class="site-footer__time" id="footer-time">BA</span>
      </div>
    </footer>
  </main>

  <script>
    function updateTime() {
      const now = new Date();
      const ba = now.toLocaleTimeString('en-US', {
        timeZone: 'America/Argentina/Buenos_Aires',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
      document.getElementById('footer-time').textContent = 'BA ' + ba;
    }
    updateTime();
    setInterval(updateTime, 30000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="main.js"></script>
</body>

</html>
